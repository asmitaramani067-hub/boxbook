<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" fill="none">
  <!-- White background circle for PWA icon -->
  <rect width="192" height="192" rx="40" fill="#ffffff"/>
  <!-- Green cricket ball -->
  <circle cx="88" cy="100" r="68" fill="url(#ballGrad)"/>
  <!-- Ball seam lines -->
  <path d="M52 68 Q88 88 124 68" stroke="white" strokeWidth="5" strokeLinecap="round" fill="none" opacity="0.7"/>
  <path d="M52 132 Q88 112 124 132" stroke="white" strokeWidth="5" strokeLinecap="round" fill="none" opacity="0.7"/>
  <!-- Bat (orange, overlapping top-right of ball) -->
  <rect x="126" y="28" width="22" height="68" rx="11" fill="#D97706"/>
  <rect x="132" y="94" width="10" height="24" rx="5" fill="#92400E"/>
  <defs>
    <radialGradient id="ballGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </radialGradient>
  </defs>
</svg>
