<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Find Turfs — PitchUp</title>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="nav-container"></div>

<div style="min-height:100vh;padding:32px 16px 80px;background:var(--ink-50)">
  <div style="max-width:1280px;margin:0 auto">

    <!-- Header -->
    <div style="margin-bottom:32px">
      <div class="accent-bar"></div>
      <h1 style="font-size:1.875rem;font-weight:900;color:var(--ink-900)">Find Turfs</h1>
      <p id="result-count" style="color:var(--ink-500);margin-top:4px;font-size:0.875rem">Loading...</p>
    </div>

    <!-- Search & Filters -->
    <div class="card" style="padding:16px;margin-bottom:32px">
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center">
        <div style="flex:1;min-width:200px;display:flex;align-items:center;gap:8px;border-radius:12px;padding:12px 16px;background:var(--ink-50);border:1px solid var(--ink-200)">
          <span style="color:var(--ink-400);font-size:14px;flex-shrink:0">🔍</span>
          <input id="search" value="" placeholder="Search by name or area..." style="background:transparent;border:none;outline:none;font-size:0.875rem;color:var(--ink-900);width:100%;font-family:inherit" onkeydown="if(event.key==='Enter')loadTurfs()"/>
        </div>
        <div style="display:flex;align-items:center;gap:8px;border-radius:12px;padding:12px 16px;background:var(--ink-50);border:1px solid var(--ink-200);min-width:160px">
          <span style="color:var(--pitch-600);font-size:12px;flex-shrink:0">📍</span>
          <select id="city" style="background:transparent;border:none;outline:none;font-size:0.875rem;color:var(--ink-800);appearance:none;cursor:pointer;font-family:inherit;flex:1">
            <option value="">All Cities</option>
            <option>Mumbai</option><option>Delhi</option><option>Bangalore</option>
            <option>Hyderabad</option><option>Chennai</option><option>Pune</option>
            <option>Ahmedabad</option><option>Surat</option>
          </select>
        </div>
        <button onclick="toggleFilters()" id="filter-btn" style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:12px;font-size:0.875rem;font-weight:500;border:1px solid var(--ink-200);background:var(--ink-50);color:var(--ink-600);cursor:pointer;transition:all 0.2s">
          ⚙ Filters
        </button>
        <button onclick="loadTurfs()" class="btn-primary" style="padding:12px 24px">Search</button>
      </div>

      <!-- Expanded filters -->
      <div id="filters-panel" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--ink-100);display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end">
        <div>
          <label style="font-size:0.75rem;color:var(--ink-500);font-weight:500;display:block;margin-bottom:6px">Min Price (₹/hr)</label>
          <input type="number" id="minPrice" placeholder="0" class="input-field" style="width:128px;padding:8px 12px"/>
        </div>
        <div>
          <label style="font-size:0.75rem;color:var(--ink-500);font-weight:500;display:block;margin-bottom:6px">Max Price (₹/hr)</label>
          <input type="number" id="maxPrice" placeholder="5000" class="input-field" style="width:128px;padding:8px 12px"/>
        </div>
        <div>
          <label style="font-size:0.75rem;color:var(--ink-500);font-weight:500;display:block;margin-bottom:6px">Sort By</label>
          <select id="sortBy" class="input-field" style="width:176px;padding:8px 12px;appearance:none">
            <option value="newest">Newest</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
        <button onclick="clearFilters()" style="display:flex;align-items:center;gap:6px;font-size:0.875rem;color:#EF4444;background:transparent;border:none;cursor:pointer;padding:8px 12px;border-radius:12px;transition:background 0.2s" onmouseover="this.style.background='#FEF2F2'" onmouseout="this.style.background='transparent'">
          ✕ Clear all
        </button>
      </div>
    </div>

    <!-- Loading skeletons -->
    <div id="loading" style="display:none">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px">
        ${Array(8).fill('<div class="card" style="overflow:hidden"><div class="skeleton" style="height:192px"></div><div style="padding:16px"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:50%;margin-bottom:12px"></div><div class="skeleton" style="height:36px;border-radius:12px"></div></div></div>').join('')}
      </div>
    </div>

    <!-- Results grid -->
    <div id="turfs-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px"></div>

    <!-- Empty state -->
    <div id="empty" style="display:none;text-align:center;padding:96px 16px">
      <p style="font-size:3.75rem;margin-bottom:16px">🏏</p>
      <h3 style="font-size:1.25rem;font-weight:700;margin-bottom:8px;color:var(--ink-900)">No turfs found</h3>
      <p style="color:var(--ink-500);margin-bottom:24px">Try adjusting your search or filters</p>
      <button onclick="clearFilters()" class="btn-outline">Clear Filters</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/navbar.js"></script><script src="js/navbar.html.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  if (params.get('search')) document.getElementById('search').value = params.get('search');
  if (params.get('city')) document.getElementById('city').value = params.get('city');

  let filtersOpen = false;
  function toggleFilters() {
    filtersOpen = !filtersOpen;
    const panel = document.getElementById('filters-panel');
    panel.style.display = filtersOpen ? 'flex' : 'none';
    const btn = document.getElementById('filter-btn');
    btn.style.background = filtersOpen ? 'var(--pitch-50)' : 'var(--ink-50)';
    btn.style.borderColor = filtersOpen ? 'var(--pitch-300)' : 'var(--ink-200)';
    btn.style.color = filtersOpen ? 'var(--pitch-800)' : 'var(--ink-600)';
  }

  function clearFilters() {
    document.getElementById('search').value = '';
    document.getElementById('city').value = '';
    document.getElementById('minPrice').value = '';
    document.getElementById('maxPrice').value = '';
    document.getElementById('sortBy').value = 'newest';
    loadTurfs();
  }

  function starHtml(rating) {
    let s = '';
    for (let i = 1; i <= 5; i++) s += `<span style="color:${i <= Math.round(rating) ? 'var(--gold-500)' : 'var(--ink-300)'}">★</span>`;
    return s;
  }

  async function loadTurfs() {
    const grid = document.getElementById('turfs-grid');
    const loading = document.getElementById('loading');
    const empty = document.getElementById('empty');
    grid.innerHTML = ''; loading.style.display = 'block'; empty.style.display = 'none';
    document.getElementById('result-count').textContent = 'Loading...';

    try {
      const q = {};
      const s = document.getElementById('search').value;
      const c = document.getElementById('city').value;
      const mn = document.getElementById('minPrice').value;
      const mx = document.getElementById('maxPrice').value;
      if (s) q.search = s; if (c) q.city = c; if (mn) q.minPrice = mn; if (mx) q.maxPrice = mx;

      let turfs = await api.get('/turfs', q);
      const sort = document.getElementById('sortBy').value;
      if (sort === 'price-asc') turfs.sort((a,b) => a.price_per_hour - b.price_per_hour);
      if (sort === 'price-desc') turfs.sort((a,b) => b.price_per_hour - a.price_per_hour);
      if (sort === 'rating') turfs.sort((a,b) => b.rating - a.rating);

      loading.style.display = 'none';
      document.getElementById('result-count').textContent = turfs.length + ' turf' + (turfs.length !== 1 ? 's' : '') + ' available';

      if (!turfs.length) { empty.style.display = 'block'; return; }

      turfs.forEach(turf => {
        const img = turf.images?.[0] || 'https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=600&q=80';
        const slotPricing = turf.slot_pricing || {};
        const prices = Object.values(slotPricing).filter(v => v > 0);
        const startPrice = prices.length ? Math.min(...prices, turf.price_per_hour) : turf.price_per_hour;
        const hasSlotPricing = prices.length > 0;
        const amenities = (turf.amenities || []).slice(0, 3);

        grid.insertAdjacentHTML('beforeend', `
          <div class="turf-card card-hover" onclick="window.location.href='/turf-detail.html?id=${turf.id}'">
            <div style="position:relative;height:192px;overflow:hidden">
              <img src="${img}" class="turf-card-img" alt="${turf.name}" onerror="this.src='https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=600&q=80'"/>
              <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.1) 50%,transparent 100%)"></div>
              <div style="position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:0.75rem;font-weight:600;background:rgba(255,255,255,0.95);color:var(--ink-800);box-shadow:0 1px 4px rgba(0,0,0,0.1)">
                <span style="color:var(--gold-500)">★</span> ${turf.rating ? parseFloat(turf.rating).toFixed(1) : 'New'}
              </div>
              <div style="position:absolute;bottom:12px;left:12px">
                ${hasSlotPricing ? '<div style="font-size:0.75rem;color:rgba(200,200,200,0.9);margin-bottom:2px">Starting from</div>' : ''}
                <span style="font-size:1.5rem;font-weight:900;color:#fff">₹${startPrice}</span>
                <span style="font-size:0.75rem;color:rgba(200,200,200,0.9);margin-left:4px">/hr</span>
              </div>
              ${(turf.time_slots||[]).length > 0 ? `<div style="position:absolute;bottom:12px;right:12px;display:flex;align-items:center;gap:4px;font-size:0.75rem;color:#fff;padding:4px 8px;border-radius:8px;background:rgba(0,0,0,0.5)">🕐 ${turf.time_slots.length} slots</div>` : ''}
            </div>
            <div style="padding:16px">
              <h3 style="font-weight:700;font-size:1rem;margin-bottom:6px;color:var(--ink-900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${turf.name}</h3>
              <div style="display:flex;align-items:center;gap:6px;font-size:0.875rem;color:var(--ink-500);margin-bottom:12px">
                <span style="color:var(--pitch-600);font-size:12px;flex-shrink:0">📍</span>
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${turf.location}, ${turf.city}</span>
              </div>
              ${amenities.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${amenities.map(a => `<span class="badge badge-green" style="font-size:0.7rem">${a}</span>`).join('')}${(turf.amenities||[]).length > 3 ? `<span class="badge" style="background:var(--ink-100);color:var(--ink-500);border:1px solid var(--ink-200);font-size:0.7rem">+${turf.amenities.length-3}</span>` : ''}</div>` : ''}
              <button class="btn-primary" style="width:100%;justify-content:center;padding:10px;font-size:0.875rem">View &amp; Book →</button>
            </div>
          </div>`);
      });
    } catch (err) {
      loading.style.display = 'none';
      showToast('Failed to load turfs', 'error');
    }
  }

  loadTurfs();
  document.getElementById('city').addEventListener('change', loadTurfs);
  document.getElementById('sortBy')?.addEventListener('change', loadTurfs);
</script>
</body>
</html>
