<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Forgot Password — PitchUp</title>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="nav-container"></div>
<div class="auth-header">
  <div style="width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;backdrop-filter:blur(4px)">🔑</div>
  <h1 style="font-size:1.875rem;font-weight:900;color:#fff;margin-bottom:6px">Forgot Password?</h1>
  <p style="color:var(--pitch-300);font-size:0.875rem">No worries, we'll send you a reset link</p>
</div>
<div style="display:flex;justify-content:center;padding:0 16px 64px;margin-top:-40px">
  <div style="width:100%;max-width:448px">
    <div style="background:#fff;border-radius:16px;padding:32px;box-shadow:0 16px 48px rgba(0,0,0,0.1);border:1px solid var(--ink-100)">
      <div id="success-state" style="display:none;text-align:center;padding:16px 0">
        <div style="width:64px;height:64px;border-radius:50%;background:var(--pitch-100);border:2px solid var(--pitch-300);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem">📧</div>
        <h2 style="font-size:1.25rem;font-weight:900;color:var(--ink-900);margin-bottom:8px">Check your inbox</h2>
        <p id="success-msg" style="font-size:0.875rem;color:var(--ink-500);line-height:1.7;margin-bottom:24px"></p>
        <p style="font-size:0.75rem;color:var(--ink-400);margin-bottom:24px">Didn't get it? Check your spam folder or <button onclick="document.getElementById('success-state').style.display='none';document.getElementById('form-state').style.display='block'" style="color:var(--pitch-800);font-weight:600;background:none;border:none;cursor:pointer;text-decoration:underline">try again</button>.</p>
        <a href="/login.html" style="display:inline-flex;align-items:center;gap:8px;font-size:0.875rem;font-weight:700;color:var(--pitch-800);text-decoration:none">← Back to Login</a>
      </div>
      <form id="form-state" onsubmit="sendReset(event)">
        <p style="font-size:0.875rem;color:var(--ink-500);line-height:1.7;margin-bottom:20px">Enter the email address linked to your PitchUp account and we'll send you a reset link.</p>
        <div style="margin-bottom:20px">
          <label class="form-label">Email Address</label>
          <div style="position:relative">
            <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--ink-400);font-size:14px">✉️</span>
            <input type="email" id="email" class="input-field pl-11" placeholder="you@example.com" required/>
          </div>
          <p class="field-error" id="email-err" style="display:none"></p>
        </div>
        <button type="submit" id="submit-btn" class="btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:0.9375rem;border-radius:12px;margin-bottom:20px">
          ✉ Send Reset Link
        </button>
        <a href="/login.html" style="display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.875rem;color:var(--ink-500);text-decoration:none;font-weight:500;transition:color 0.2s" onmouseover="this.style.color='var(--pitch-800)'" onmouseout="this.style.color='var(--ink-500)'">← Back to Login</a>
      </form>
    </div>
  </div>
</div>
<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/navbar.js"></script><script src="js/navbar.html.js"></script>
<script>
async function sendReset(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const errEl = document.getElementById('email-err');
  errEl.style.display = 'none';
  if (!email) { errEl.textContent = '⚠ Email is required'; errEl.style.display = 'flex'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent = '⚠ Enter a valid email address'; errEl.style.display = 'flex'; return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner spinner-sm" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff"></span>';
  try {
    await api.post('/auth/forgot-password', { email });
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('success-state').style.display = 'block';
    document.getElementById('success-msg').innerHTML = `If <strong>${email}</strong> is registered with PitchUp, you'll receive a password reset link shortly. The link expires in 15 minutes.`;
  } catch (err) {
    errEl.textContent = '⚠ ' + (err.message || 'Something went wrong');
    errEl.style.display = 'flex';
    btn.disabled = false; btn.innerHTML = '✉ Send Reset Link';
  }
}
</script>
</body>
</html>
