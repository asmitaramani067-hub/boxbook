<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — PitchUp</title>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="nav-container"></div>

<!-- Green header band -->
<div class="auth-header">
  <div style="width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;backdrop-filter:blur(4px)">🏏</div>
  <h1 style="font-size:1.875rem;font-weight:900;color:#fff;margin-bottom:6px">Welcome back</h1>
  <p style="color:var(--pitch-300);font-size:0.875rem">Sign in to your PitchUp account</p>
</div>

<div style="display:flex;justify-content:center;padding:0 16px 64px;margin-top:-32px">
  <div style="width:100%;max-width:448px">
    <form id="login-form" style="background:#fff;border-radius:16px;padding:32px;box-shadow:0 16px 48px rgba(0,0,0,0.1);border:1px solid var(--ink-100)">

      <!-- Email -->
      <div style="margin-bottom:20px">
        <label class="form-label">Email</label>
        <div style="position:relative">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--ink-400);font-size:14px">✉️</span>
          <input type="email" id="email" class="input-field pl-11" placeholder="you@example.com" required/>
        </div>
        <p class="field-error" id="email-err" style="display:none"></p>
      </div>

      <!-- Password -->
      <div style="margin-bottom:24px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <label class="form-label" style="margin-bottom:0">Password</label>
          <a href="/forgot-password.html" style="font-size:0.75rem;color:var(--pitch-800);font-weight:600;text-decoration:none">Forgot password?</a>
        </div>
        <div style="position:relative">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--ink-400);font-size:14px">🔒</span>
          <input type="password" id="password" class="input-field pl-11 pr-11" placeholder="••••••••" required/>
          <button type="button" onclick="togglePass()" id="eye-btn" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-400);font-size:14px">👁</button>
        </div>
        <p class="field-error" id="pass-err" style="display:none"></p>
      </div>

      <button type="submit" id="submit-btn" class="btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:0.9375rem;border-radius:12px;margin-bottom:20px">
        Sign In →
      </button>

      <p style="text-align:center;font-size:0.875rem;color:var(--ink-500)">
        Don't have an account? <a href="/register.html" style="color:var(--pitch-800);font-weight:600;text-decoration:none">Sign up free</a>
      </p>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script src="js/navbar.html.js"></script>
<script>
  if (isLoggedIn()) window.location.href = '/index.html';
  let showPass = false;
  function togglePass() {
    showPass = !showPass;
    document.getElementById('password').type = showPass ? 'text' : 'password';
    document.getElementById('eye-btn').textContent = showPass ? '🙈' : '👁';
  }
  function showErr(id, msg) { const el = document.getElementById(id); el.textContent = '⚠ ' + msg; el.style.display = 'flex'; }
  function clearErr(id) { document.getElementById(id).style.display = 'none'; }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    clearErr('email-err'); clearErr('pass-err');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email) return showErr('email-err', 'Email is required');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showErr('email-err', 'Enter a valid email address');
    if (!password) return showErr('pass-err', 'Password is required');

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner spinner-sm" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff"></span>';
    try {
      const data = await api.post('/auth/login', { email, password });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showToast('Welcome back, ' + (data.user.name?.split(' ')[0] || '') + '!');
      setTimeout(() => window.location.href = data.user.role === 'owner' ? '/owner-dashboard.html' : '/turfs.html', 800);
    } catch (err) {
      const msg = err.message || 'Login failed';
      if (msg.toLowerCase().includes('password')) showErr('pass-err', msg);
      else showErr('email-err', msg);
      btn.disabled = false; btn.innerHTML = 'Sign In →';
    }
  });
</script>
</body>
</html>
