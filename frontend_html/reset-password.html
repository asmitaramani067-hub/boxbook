<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password — PitchUp</title>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="nav-container"></div>
<div class="auth-header">
  <div style="width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;backdrop-filter:blur(4px)">🔒</div>
  <h1 style="font-size:1.875rem;font-weight:900;color:#fff;margin-bottom:6px">Set New Password</h1>
  <p style="color:var(--pitch-300);font-size:0.875rem">Choose a strong password for your account</p>
</div>
<div style="display:flex;justify-content:center;padding:0 16px 64px;margin-top:-40px">
  <div style="width:100%;max-width:448px">
    <form id="reset-form" onsubmit="doReset(event)" style="background:#fff;border-radius:16px;padding:32px;box-shadow:0 16px 48px rgba(0,0,0,0.1);border:1px solid var(--ink-100)">
      <div style="margin-bottom:20px">
        <label class="form-label">New Password</label>
        <div style="position:relative">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--ink-400);font-size:14px">🔒</span>
          <input type="password" id="password" class="input-field pl-11 pr-11" placeholder="Min 6 characters" required oninput="updateStrength()"/>
          <button type="button" onclick="togglePass()" id="eye-btn" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-400);font-size:14px">👁</button>
        </div>
        <p class="field-error" id="pass-err" style="display:none"></p>
      </div>
      <div style="margin-bottom:20px">
        <label class="form-label">Confirm Password</label>
        <div style="position:relative">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--ink-400);font-size:14px">🔒</span>
          <input type="password" id="confirm" class="input-field pl-11" placeholder="Repeat your password" required/>
        </div>
        <p class="field-error" id="conf-err" style="display:none"></p>
      </div>
      <!-- Strength bar -->
      <div id="strength-wrap" style="display:none;margin-bottom:20px">
        <div style="display:flex;gap:4px;align-items:center">
          <div style="display:flex;gap:4px;flex:1">
            <div id="s1" style="height:6px;flex:1;border-radius:999px;background:var(--ink-200);transition:background 0.3s"></div>
            <div id="s2" style="height:6px;flex:1;border-radius:999px;background:var(--ink-200);transition:background 0.3s"></div>
            <div id="s3" style="height:6px;flex:1;border-radius:999px;background:var(--ink-200);transition:background 0.3s"></div>
            <div id="s4" style="height:6px;flex:1;border-radius:999px;background:var(--ink-200);transition:background 0.3s"></div>
          </div>
          <span id="strength-label" style="font-size:0.75rem;color:var(--ink-400);width:56px;text-align:right"></span>
        </div>
      </div>
      <button type="submit" id="submit-btn" class="btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:0.9375rem;border-radius:12px;margin-bottom:20px">
        Reset Password →
      </button>
      <p style="text-align:center;font-size:0.75rem;color:var(--ink-400)">Remember it now? <a href="/login.html" style="color:var(--pitch-800);font-weight:700;text-decoration:none">Sign in</a></p>
    </form>
  </div>
</div>
<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/navbar.js"></script><script src="js/navbar.html.js"></script>
<script>
  const token = new URLSearchParams(location.search).get('token');
  if (!token) showToast('Invalid reset link', 'error');
  let showPass = false;
  function togglePass() { showPass = !showPass; document.getElementById('password').type = showPass ? 'text' : 'password'; document.getElementById('eye-btn').textContent = showPass ? '🙈' : '👁'; }
  function updateStrength() {
    const pw = document.getElementById('password').value;
    const wrap = document.getElementById('strength-wrap');
    if (!pw.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    const strength = pw.length < 6 ? 1 : pw.length < 10 ? 2 : pw.length < 14 ? 3 : 4;
    const colors = ['','#EF4444','#F59E0B','var(--pitch-400)','var(--pitch-700)'];
    const labels = ['','Too short','Fair','Good','Strong'];
    for (let i = 1; i <= 4; i++) document.getElementById('s'+i).style.background = i <= strength ? colors[strength] : 'var(--ink-200)';
    document.getElementById('strength-label').textContent = labels[strength];
  }
  async function doReset(e) {
    e.preventDefault();
    const pass = document.getElementById('password').value;
    const conf = document.getElementById('confirm').value;
    document.getElementById('pass-err').style.display = 'none';
    document.getElementById('conf-err').style.display = 'none';
    if (!pass || pass.length < 6) { document.getElementById('pass-err').textContent = '⚠ Password must be at least 6 characters'; document.getElementById('pass-err').style.display = 'flex'; return; }
    if (pass !== conf) { document.getElementById('conf-err').textContent = '⚠ Passwords do not match'; document.getElementById('conf-err').style.display = 'flex'; return; }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner spinner-sm" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff"></span>';
    try {
      const data = await api.put('/auth/reset-password/' + token, { password: pass });
      if (data.token) { localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); }
      showToast('Password reset! Logging you in...');
      setTimeout(() => window.location.href = data.user?.role === 'owner' ? '/owner-dashboard.html' : '/turfs.html', 1200);
    } catch (err) {
      document.getElementById('pass-err').textContent = '⚠ ' + (err.message || 'Reset failed. Link may have expired.');
      document.getElementById('pass-err').style.display = 'flex';
      btn.disabled = false; btn.innerHTML = 'Reset Password →';
    }
  }
</script>
</body>
</html>
