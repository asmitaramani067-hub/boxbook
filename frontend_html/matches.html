<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Find Players — PitchUp</title>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="nav-container"></div>
<div id="toast-container"></div>

<!-- Hero -->
<div style="background:linear-gradient(135deg,var(--pitch-900) 0%,var(--pitch-800) 50%,var(--pitch-700) 100%);padding:96px 16px 48px;position:relative;overflow:hidden">
  <div style="position:absolute;inset:0;opacity:0.04;background-image:radial-gradient(circle,#fff 1px,transparent 1px);background-size:30px 30px"></div>
  <div style="max-width:1280px;margin:0 auto;position:relative;z-index:1">
    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:24px">
      <div>
        <div class="accent-bar" style="background:rgba(255,255,255,0.4)"></div>
        <h1 style="font-size:clamp(1.75rem,5vw,2.75rem);font-weight:900;color:#fff;margin-bottom:8px">Need players for today?</h1>
        <p style="color:var(--pitch-300);font-size:1rem;margin-bottom:20px">Find open matches or post your own — fill your team fast.</p>
        <div style="display:flex;flex-wrap:wrap;gap:12px">
          <div style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:12px 20px;text-align:center;backdrop-filter:blur(4px)">
            <p id="stat-open" style="font-size:1.5rem;font-weight:900;color:#fff">—</p>
            <p style="font-size:0.75rem;color:var(--pitch-300);font-weight:600">Open Matches</p>
          </div>
          <div style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:12px 20px;text-align:center;backdrop-filter:blur(4px)">
            <p id="stat-urgent" style="font-size:1.5rem;font-weight:900;color:#fff">— 🔥</p>
            <p style="font-size:0.75rem;color:var(--pitch-300);font-weight:600">Urgent</p>
          </div>
          <div style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:12px 20px;text-align:center;backdrop-filter:blur(4px)">
            <p id="stat-spots" style="font-size:1.5rem;font-weight:900;color:#fff">—</p>
            <p style="font-size:0.75rem;color:var(--pitch-300);font-weight:600">Open Spots</p>
          </div>
        </div>
      </div>
      <button onclick="openPostModal()" style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:14px;background:linear-gradient(to right,var(--gold-500),#F97316);color:#fff;font-weight:900;font-size:0.9375rem;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(245,158,11,0.3);transition:all 0.2s;flex-shrink:0" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
        + Post a Match
      </button>
    </div>
  </div>
</div>

<!-- Sticky filter bar -->
<div class="sticky-filter">
  <div style="max-width:1280px;margin:0 auto;padding:12px 16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center">
    <div style="flex:1;min-width:180px;display:flex;align-items:center;gap:8px;border-radius:12px;padding:10px 14px;background:var(--ink-50);border:1px solid var(--ink-200)">
      <span style="color:var(--ink-400);font-size:14px;flex-shrink:0">🔍</span>
      <input id="city-search" placeholder="Search by city..." style="background:transparent;border:none;outline:none;font-size:0.875rem;color:var(--ink-900);width:100%;font-family:inherit" oninput="onCityInput()" />
      <button id="clear-city" onclick="clearCity()" style="display:none;background:none;border:none;cursor:pointer;color:var(--ink-400);font-size:16px;line-height:1;padding:0">✕</button>
    </div>
    <div class="tab-pills">
      <button class="tab-pill active" onclick="setStatusFilter('looking',this)">Looking for players</button>
      <button class="tab-pill" onclick="setStatusFilter('full',this)">Team complete</button>
      <button class="tab-pill" onclick="setStatusFilter('',this)">All</button>
    </div>
  </div>
</div>

<div style="max-width:1280px;margin:0 auto;padding:32px 16px 80px">
  <div id="loading" style="display:flex;justify-content:center;padding:64px 0"><div class="spinner"></div></div>
  <div id="matches-grid" style="display:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px"></div>
  <div id="empty-state" style="display:none;text-align:center;padding:96px 16px">
    <p style="font-size:3.75rem;margin-bottom:16px">👥</p>
    <h3 style="font-size:1.25rem;font-weight:700;color:var(--ink-900);margin-bottom:8px">No matches found</h3>
    <p style="color:var(--ink-500);margin-bottom:24px">Be the first to post a match in your city!</p>
    <button onclick="openPostModal()" class="btn-primary">Post a Match</button>
  </div>
  <div id="load-more-wrap" style="display:none;text-align:center;margin-top:32px">
    <button onclick="loadMore()" class="btn-outline">Load More</button>
  </div>
</div>

<!-- Post Match Modal -->
<div id="post-modal" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:520px;max-height:90vh;overflow-y:auto">
    <div style="background:linear-gradient(135deg,var(--pitch-900),var(--pitch-800));padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <h3 style="font-size:1.125rem;font-weight:900;color:#fff;margin-bottom:4px">Post a Match</h3>
          <p id="step-indicator" style="font-size:0.75rem;color:var(--pitch-300)">Step 1 of 2</p>
        </div>
        <button onclick="closePostModal()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px">✕</button>
      </div>
      <!-- Step dots -->
      <div style="display:flex;gap:6px;margin-top:16px">
        <div id="dot-1" style="height:4px;flex:1;border-radius:999px;background:#fff;transition:all 0.3s"></div>
        <div id="dot-2" style="height:4px;flex:1;border-radius:999px;background:rgba(255,255,255,0.3);transition:all 0.3s"></div>
      </div>
    </div>
    <div style="padding:24px">
      <!-- Step 1 -->
      <div id="step-1">
        <div style="margin-bottom:20px">
          <label style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:10px">Match Type</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <button onclick="selectMatchType('Box Cricket',this)" class="match-type-btn" style="padding:16px;border-radius:12px;border:2px solid var(--ink-200);background:#fff;cursor:pointer;text-align:center;transition:all 0.2s">
              <div style="font-size:1.5rem;margin-bottom:6px">🏏</div>
              <div style="font-size:0.875rem;font-weight:700;color:var(--ink-900)">Box Cricket</div>
            </button>
            <button onclick="selectMatchType('Open Ground',this)" class="match-type-btn" style="padding:16px;border-radius:12px;border:2px solid var(--ink-200);background:#fff;cursor:pointer;text-align:center;transition:all 0.2s">
              <div style="font-size:1.5rem;margin-bottom:6px">🌿</div>
              <div style="font-size:0.875rem;font-weight:700;color:var(--ink-900)">Open Ground</div>
            </button>
          </div>
        </div>
        <div style="margin-bottom:20px">
          <label style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:10px">Players Needed</label>
          <div style="display:flex;align-items:center;gap:16px;background:var(--ink-50);border-radius:12px;padding:12px 16px;border:1px solid var(--ink-200)">
            <button onclick="adjustPlayers(-1)" style="width:36px;height:36px;border-radius:10px;border:1px solid var(--ink-200);background:#fff;cursor:pointer;font-size:1.25rem;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink-700)">−</button>
            <span id="player-count" style="font-size:1.5rem;font-weight:900;color:var(--ink-900);flex:1;text-align:center">6</span>
            <button onclick="adjustPlayers(1)" style="width:36px;height:36px;border-radius:10px;border:1px solid var(--ink-200);background:#fff;cursor:pointer;font-size:1.25rem;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink-700)">+</button>
          </div>
        </div>
        <button onclick="goStep2()" class="btn-primary" style="width:100%;justify-content:center;padding:14px">Next →</button>
      </div>

      <!-- Step 2 -->
      <div id="step-2" style="display:none">
        <div style="display:grid;gap:14px">
          <div>
            <label class="form-label" style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Title</label>
            <input id="match-title" class="input-field" placeholder="e.g. Evening match at Andheri"/>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <label class="form-label" style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">City</label>
              <input id="match-city" class="input-field" placeholder="Mumbai"/>
            </div>
            <div>
              <label class="form-label" style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Location</label>
              <input id="match-location" class="input-field" placeholder="Andheri Sports Complex"/>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <label class="form-label" style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Date</label>
              <input type="date" id="match-date" class="input-field"/>
            </div>
            <div>
              <label class="form-label" style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Time</label>
              <input type="time" id="match-time" class="input-field"/>
            </div>
          </div>
          <div>
            <label class="form-label" style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Description (optional)</label>
            <textarea id="match-desc" class="input-field" rows="3" placeholder="Any details about the match..." style="resize:vertical"></textarea>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:20px">
          <button onclick="goStep1()" class="btn-ghost" style="flex:1">← Back</button>
          <button onclick="submitMatch()" class="btn-primary" style="flex:1;justify-content:center">Post Match 🏏</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script src="js/navbar.html.js"></script>
<script>
let matches = [], currentPage = 1, totalPages = 1, statusFilter = 'looking', cityFilter = '';
let postMatchType = 'Box Cricket', postPlayerCount = 6;

function minutesUntil(date, time) {
  const dt = new Date(`${date}T${time}`);
  return Math.round((dt - Date.now()) / 60000);
}

function urgencyBadge(date, time) {
  const mins = minutesUntil(date, time);
  if (mins < 0) return `<span class="badge badge-red">Ended</span>`;
  if (mins < 60) return `<span class="badge badge-red">🔥 ${mins}m left</span>`;
  if (mins < 180) return `<span class="badge badge-amber">⚡ ${Math.round(mins/60)}h left</span>`;
  return '';
}

function avatarHtml(players, total) {
  const shown = (players || []).slice(0, 4);
  let html = '<div style="display:flex;align-items:center">';
  shown.forEach(p => {
    html += `<div class="avatar-circle" title="${p.name||'Player'}">${(p.name||'P')[0].toUpperCase()}</div>`;
  });
  const empty = Math.max(0, total - shown.length);
  for (let i = 0; i < Math.min(empty, 3); i++) html += `<div class="avatar-circle empty">+</div>`;
  html += '</div>';
  return html;
}

async function loadMatches(reset = true) {
  if (reset) { currentPage = 1; matches = []; }
  document.getElementById('loading').style.display = reset ? 'flex' : 'none';
  try {
    const params = { page: currentPage };
    if (cityFilter) params.city = cityFilter;
    if (statusFilter) params.status = statusFilter;
    const res = await api.get('/matches', params);
    const newMatches = res.matches || res || [];
    totalPages = res.pages || 1;
    if (reset) matches = newMatches; else matches = [...matches, ...newMatches];

    // Stats
    const open = matches.filter(m => m.status === 'looking').length;
    const urgent = matches.filter(m => { const mins = minutesUntil(m.date, m.time); return mins > 0 && mins < 120; }).length;
    const spots = matches.reduce((s, m) => s + Math.max(0, (m.total_players_needed||m.totalPlayersNeeded||0) - (m.current_players||m.currentPlayers||0)), 0);
    document.getElementById('stat-open').textContent = open;
    document.getElementById('stat-urgent').textContent = urgent + ' 🔥';
    document.getElementById('stat-spots').textContent = spots;

    document.getElementById('loading').style.display = 'none';
    renderMatches();
  } catch {
    document.getElementById('loading').style.display = 'none';
    showToast('Failed to load matches', 'error');
  }
}

function renderMatches() {
  const grid = document.getElementById('matches-grid');
  const empty = document.getElementById('empty-state');
  const loadMoreWrap = document.getElementById('load-more-wrap');

  if (!matches.length) { grid.style.display = 'none'; empty.style.display = 'block'; loadMoreWrap.style.display = 'none'; return; }
  empty.style.display = 'none';
  grid.style.display = 'grid';
  loadMoreWrap.style.display = currentPage < totalPages ? 'block' : 'none';

  const user = getUser();
  grid.innerHTML = matches.map(m => {
    const total = m.total_players_needed || m.totalPlayersNeeded || 0;
    const current = m.current_players || m.currentPlayers || 0;
    const pct = total ? Math.round((current / total) * 100) : 0;
    const isFull = m.status === 'full' || current >= total;
    const isUrgent = minutesUntil(m.date, m.time) < 120 && minutesUntil(m.date, m.time) > 0;
    const isOrganiser = user && (m.organiser_id === user.id || m.organiserId === user.id);
    const isJoined = m.is_joined || m.isJoined;
    const accentColor = isUrgent ? '#EF4444' : isFull ? '#F59E0B' : 'var(--pitch-600)';
    const typeBadge = m.match_type === 'Box Cricket' || m.matchType === 'Box Cricket' ? 'badge-green' : 'badge-blue';

    return `
    <div class="match-card" onclick="window.location.href='/match-detail.html?id=${m.id}'">
      <div style="height:4px;background:${accentColor}"></div>
      <div style="padding:16px;flex:1;display:flex;flex-direction:column">
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
          <span class="badge ${typeBadge}">${m.match_type||m.matchType||'Cricket'}</span>
          ${isUrgent ? `<span class="badge badge-red">🔥 Urgent</span>` : ''}
          ${isFull ? `<span class="badge badge-amber">Team Full</span>` : ''}
        </div>
        <h3 style="font-size:0.9375rem;font-weight:700;color:var(--ink-900);margin-bottom:8px;line-clamp:2" class="line-clamp-2">${m.title||'Cricket Match'}</h3>
        <div style="display:flex;align-items:center;gap:4px;font-size:0.8125rem;color:var(--ink-500);margin-bottom:4px">
          <span style="color:var(--pitch-600)">📍</span> ${m.location||''}, ${m.city||''}
        </div>
        <div style="display:flex;align-items:center;gap:4px;font-size:0.8125rem;color:var(--ink-500);margin-bottom:12px">
          <span>🕐</span> ${m.date||''} ${m.time||''}
          ${urgencyBadge(m.date, m.time)}
        </div>
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--ink-500);margin-bottom:6px">
            <span>${avatarHtml(m.players, current)}</span>
            <span style="font-weight:600">${current}/${total} players</span>
          </div>
          <div class="fill-bar"><div class="fill-bar-inner" style="width:${pct}%;background:${accentColor}"></div></div>
        </div>
        <div style="margin-top:auto" onclick="event.stopPropagation()">
          ${isOrganiser
            ? `<button class="btn-outline" style="width:100%;justify-content:center;font-size:0.8125rem;padding:10px;border-color:var(--ink-300);color:var(--ink-600)">Your match</button>`
            : isJoined
              ? `<button onclick="leaveMatch(${m.id})" style="width:100%;padding:10px;border-radius:12px;border:2px solid #FECACA;background:#FEF2F2;color:#DC2626;font-weight:700;cursor:pointer;font-size:0.8125rem;transition:all 0.2s">✓ You're in — Leave</button>`
              : isFull
                ? `<button class="slot-btn booked" style="width:100%;padding:10px;cursor:default">Team Full</button>`
                : `<button onclick="joinMatch(${m.id})" class="btn-primary" style="width:100%;justify-content:center;font-size:0.8125rem;padding:10px">Join this match</button>`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

async function joinMatch(id) {
  if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
  try {
    await api.post(`/matches/${id}/join`);
    showToast('Joined the match!');
    loadMatches();
  } catch (err) { showToast(err.message || 'Failed to join', 'error'); }
}

async function leaveMatch(id) {
  try {
    await api.delete(`/matches/${id}/join`);
    showToast('Left the match');
    loadMatches();
  } catch (err) { showToast(err.message || 'Failed', 'error'); }
}

function loadMore() { currentPage++; loadMatches(false); }

function setStatusFilter(status, el) {
  statusFilter = status;
  document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadMatches();
}

function onCityInput() {
  const val = document.getElementById('city-search').value;
  document.getElementById('clear-city').style.display = val ? 'block' : 'none';
  cityFilter = val;
  clearTimeout(window._cityTimer);
  window._cityTimer = setTimeout(() => loadMatches(), 400);
}

function clearCity() {
  document.getElementById('city-search').value = '';
  document.getElementById('clear-city').style.display = 'none';
  cityFilter = '';
  loadMatches();
}

// Post modal
function openPostModal() {
  if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
  document.getElementById('post-modal').style.display = 'flex';
  document.getElementById('match-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('match-date').min = new Date().toISOString().split('T')[0];
}
function closePostModal() { document.getElementById('post-modal').style.display = 'none'; }

function selectMatchType(type, el) {
  postMatchType = type;
  document.querySelectorAll('.match-type-btn').forEach(b => { b.style.borderColor = 'var(--ink-200)'; b.style.background = '#fff'; });
  el.style.borderColor = 'var(--pitch-800)';
  el.style.background = 'var(--pitch-50)';
}

function adjustPlayers(delta) {
  postPlayerCount = Math.max(2, Math.min(22, postPlayerCount + delta));
  document.getElementById('player-count').textContent = postPlayerCount;
}

function goStep2() {
  document.getElementById('step-1').style.display = 'none';
  document.getElementById('step-2').style.display = 'block';
  document.getElementById('step-indicator').textContent = 'Step 2 of 2';
  document.getElementById('dot-1').style.background = 'rgba(255,255,255,0.5)';
  document.getElementById('dot-2').style.background = '#fff';
}
function goStep1() {
  document.getElementById('step-2').style.display = 'none';
  document.getElementById('step-1').style.display = 'block';
  document.getElementById('step-indicator').textContent = 'Step 1 of 2';
  document.getElementById('dot-1').style.background = '#fff';
  document.getElementById('dot-2').style.background = 'rgba(255,255,255,0.3)';
}

async function submitMatch() {
  const title = document.getElementById('match-title').value.trim();
  const city = document.getElementById('match-city').value.trim();
  const location = document.getElementById('match-location').value.trim();
  const date = document.getElementById('match-date').value;
  const time = document.getElementById('match-time').value;
  if (!title || !city || !location || !date || !time) return showToast('Please fill all required fields', 'error');
  try {
    await api.post('/matches', { title, city, location, date, time, matchType: postMatchType, totalPlayersNeeded: postPlayerCount, description: document.getElementById('match-desc').value });
    showToast('Match posted!');
    closePostModal();
    loadMatches();
  } catch (err) { showToast(err.message || 'Failed to post match', 'error'); }
}

function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const id = 'toast-' + Date.now();
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  c.insertAdjacentHTML('beforeend', `<div id="${id}" class="toast-item ${type}">${icons[type]||'ℹ️'} ${msg}</div>`);
  setTimeout(() => document.getElementById(id)?.remove(), 4000);
}

loadMatches();
</script>
</body>
</html>
