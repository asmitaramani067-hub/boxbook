<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Bookings — PitchUp</title>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="nav-container"></div>
<div id="toast-container"></div>

<!-- Page Header -->
<div class="page-header">
  <div style="max-width:1280px;margin:0 auto;padding:0 16px;position:relative;z-index:1">
    <div class="accent-bar" style="background:rgba(255,255,255,0.4)"></div>
    <h1 style="font-size:clamp(1.75rem,5vw,2.5rem);font-weight:900;color:#fff;margin-bottom:8px">My Bookings</h1>
    <p id="booking-count" style="color:var(--pitch-300);font-size:0.9375rem">Loading your bookings...</p>
  </div>
</div>

<div style="max-width:1280px;margin:0 auto;padding:32px 16px 80px">
  <!-- Filter tabs -->
  <div style="margin-bottom:24px">
    <div class="filter-tabs" style="max-width:480px">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-tab" data-filter="confirmed" onclick="setFilter('confirmed',this)">Confirmed</button>
      <button class="filter-tab" data-filter="pending" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-tab" data-filter="cancelled" onclick="setFilter('cancelled',this)">Cancelled</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" style="display:flex;justify-content:center;padding:64px 0"><div class="spinner"></div></div>

  <!-- Bookings list -->
  <div id="bookings-list" style="display:none;display:flex;flex-direction:column;gap:16px"></div>

  <!-- Empty state -->
  <div id="empty-state" style="display:none;text-align:center;padding:96px 16px">
    <p style="font-size:3.75rem;margin-bottom:16px">🏏</p>
    <h3 style="font-size:1.25rem;font-weight:700;color:var(--ink-900);margin-bottom:8px">No bookings yet</h3>
    <p style="color:var(--ink-500);margin-bottom:24px">Book a turf and your reservations will appear here.</p>
    <a href="/turfs.html" class="btn-primary">Find Turfs →</a>
  </div>
</div>

<!-- Reschedule Modal -->
<div id="reschedule-modal" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:480px;max-height:90vh;overflow-y:auto">
    <div style="background:linear-gradient(135deg,var(--pitch-900),var(--pitch-800));padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="font-size:1.125rem;font-weight:900;color:#fff">Reschedule Booking</h3>
        <button onclick="closeRescheduleModal()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px">✕</button>
      </div>
    </div>
    <div style="padding:24px">
      <div style="margin-bottom:16px">
        <label class="form-label" style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:8px">New Date</label>
        <input type="date" id="reschedule-date" class="input-field" onchange="loadRescheduleSlots()"/>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:0.75rem;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:10px">Select New Slot</label>
        <div id="reschedule-slots" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <p style="grid-column:1/-1;color:var(--ink-400);font-size:0.875rem">Pick a date first</p>
        </div>
      </div>
      <div style="display:flex;gap:12px">
        <button onclick="closeRescheduleModal()" class="btn-ghost" style="flex:1">Cancel</button>
        <button onclick="confirmReschedule()" id="confirm-reschedule-btn" class="btn-primary" style="flex:1;justify-content:center" disabled>Confirm</button>
      </div>
    </div>
  </div>
</div>

<!-- Cancel Confirm Dialog -->
<div id="cancel-modal" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:380px">
    <div style="padding:24px">
      <div style="width:56px;height:56px;border-radius:50%;background:#FEF2F2;border:2px solid #FECACA;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.5rem">⚠️</div>
      <h3 style="font-size:1rem;font-weight:700;color:var(--ink-900);text-align:center;margin-bottom:8px">Cancel Booking?</h3>
      <p style="font-size:0.875rem;color:var(--ink-500);text-align:center;margin-bottom:20px">This action cannot be undone. Your slot will be released.</p>
      <div style="display:flex;gap:12px">
        <button onclick="closeCancelModal()" class="btn-ghost" style="flex:1">Keep It</button>
        <button onclick="confirmCancel()" style="flex:1;padding:10px 20px;border-radius:12px;background:#EF4444;color:#fff;font-weight:700;border:none;cursor:pointer;transition:all 0.2s">Yes, Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script src="js/navbar.html.js"></script>
<script>
requireAuth();

let allBookings = [], currentFilter = 'all', cancelTarget = null, rescheduleTarget = null, rescheduleSlot = null;
const today = new Date().toISOString().split('T')[0];

function statusBadge(status) {
  const map = {
    confirmed: { bg:'var(--pitch-100)', color:'var(--pitch-900)', border:'#C8E6C9', dot:'var(--pitch-600)' },
    pending:   { bg:'var(--gold-100)',  color:'#92400E',          border:'#FDE68A', dot:'var(--gold-500)' },
    cancelled: { bg:'#FEF2F2',          color:'#DC2626',          border:'#FECACA', dot:'#EF4444' },
  };
  const s = map[status] || map.pending;
  return `<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:0.75rem;font-weight:700;background:${s.bg};color:${s.color};border:1px solid ${s.border}">
    <span style="width:6px;height:6px;border-radius:50%;background:${s.dot};flex-shrink:0"></span>${status}
  </span>`;
}

async function loadBookings() {
  try {
    allBookings = await api.get('/bookings/my') || [];
    document.getElementById('loading').style.display = 'none';
    renderBookings();
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    showToast('Failed to load bookings', 'error');
  }
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderBookings();
}

function renderBookings() {
  const filtered = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);
  const listEl = document.getElementById('bookings-list');
  const emptyEl = document.getElementById('empty-state');
  const countEl = document.getElementById('booking-count');

  countEl.textContent = `${allBookings.length} booking${allBookings.length !== 1 ? 's' : ''} total`;

  if (!filtered.length) {
    listEl.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';
  listEl.style.display = 'flex';

  listEl.innerHTML = filtered.map(b => {
    const img = b.turf_image || b.turfImage || 'https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=400&q=80';
    const canAct = b.status !== 'cancelled';
    return `
    <div class="booking-card">
      <div style="display:flex;gap:0">
        <!-- Thumbnail -->
        <div style="width:120px;min-width:120px;overflow:hidden;flex-shrink:0">
          <img src="${img}" alt="${b.turf_name||b.turfName||''}" style="width:100%;height:100%;object-fit:cover;min-height:120px" onerror="this.src='https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=400&q=80'"/>
        </div>
        <!-- Info -->
        <div style="flex:1;padding:16px;min-width:0">
          <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
            <h3 style="font-size:1rem;font-weight:700;color:var(--ink-900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${b.turf_name||b.turfName||'Turf'}</h3>
            ${statusBadge(b.status)}
          </div>
          <div style="display:flex;align-items:center;gap:4px;font-size:0.8125rem;color:var(--ink-500);margin-bottom:10px">
            <span style="color:var(--pitch-600)">📍</span> ${b.turf_location||b.turfLocation||''}
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px">
            <div style="background:var(--ink-50);border-radius:8px;padding:8px">
              <p style="font-size:0.65rem;color:var(--ink-400);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px">Date</p>
              <p style="font-size:0.8125rem;font-weight:600;color:var(--ink-900)">${b.date||''}</p>
            </div>
            <div style="background:var(--ink-50);border-radius:8px;padding:8px">
              <p style="font-size:0.65rem;color:var(--ink-400);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px">Time</p>
              <p style="font-size:0.8125rem;font-weight:600;color:var(--ink-900)">${b.time_slot||b.timeSlot||''}</p>
            </div>
            <div style="background:var(--ink-50);border-radius:8px;padding:8px">
              <p style="font-size:0.65rem;color:var(--ink-400);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px">Box</p>
              <p style="font-size:0.8125rem;font-weight:600;color:var(--ink-900)">${b.box_name||b.boxName||'—'}</p>
            </div>
            <div style="background:var(--pitch-50);border-radius:8px;padding:8px">
              <p style="font-size:0.65rem;color:var(--pitch-700);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px">Price</p>
              <p style="font-size:0.8125rem;font-weight:700;color:var(--pitch-800)">₹${b.total_price||b.totalPrice||0}</p>
            </div>
          </div>
          ${canAct ? `
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button onclick="openReschedule(${b.id||b.booking_id},${b.turf_id||b.turfId})" class="btn-outline" style="font-size:0.8125rem;padding:8px 16px">📅 Reschedule</button>
            <button onclick="openCancel(${b.id||b.booking_id})" style="font-size:0.8125rem;padding:8px 16px;border-radius:12px;border:2px solid #FECACA;background:#FEF2F2;color:#DC2626;font-weight:600;cursor:pointer;transition:all 0.2s">✕ Cancel</button>
          </div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openCancel(id) { cancelTarget = id; document.getElementById('cancel-modal').style.display = 'flex'; }
function closeCancelModal() { cancelTarget = null; document.getElementById('cancel-modal').style.display = 'none'; }

async function confirmCancel() {
  if (!cancelTarget) return;
  try {
    await api.put(`/bookings/${cancelTarget}/cancel`);
    showToast('Booking cancelled');
    closeCancelModal();
    loadBookings();
  } catch (err) { showToast(err.message || 'Failed to cancel', 'error'); }
}

function openReschedule(bookingId, turfId) {
  rescheduleTarget = { bookingId, turfId };
  rescheduleSlot = null;
  const dateInput = document.getElementById('reschedule-date');
  dateInput.value = today;
  dateInput.min = today;
  document.getElementById('reschedule-slots').innerHTML = '<p style="grid-column:1/-1;color:var(--ink-400);font-size:0.875rem">Pick a date first</p>';
  document.getElementById('confirm-reschedule-btn').disabled = true;
  document.getElementById('reschedule-modal').style.display = 'flex';
}
function closeRescheduleModal() { document.getElementById('reschedule-modal').style.display = 'none'; rescheduleTarget = null; rescheduleSlot = null; }

async function loadRescheduleSlots() {
  if (!rescheduleTarget) return;
  const date = document.getElementById('reschedule-date').value;
  const container = document.getElementById('reschedule-slots');
  container.innerHTML = '<div style="grid-column:1/-1;display:flex;justify-content:center;padding:16px"><div class="spinner spinner-sm"></div></div>';
  try {
    const [avail, booked] = await Promise.all([
      api.get(`/turfs/${rescheduleTarget.turfId}/availability`, { date }),
      api.get('/bookings/slots', { turfId: rescheduleTarget.turfId, date }),
    ]);
    const slots = Object.keys(avail || {}).sort();
    if (!slots.length) { container.innerHTML = '<p style="grid-column:1/-1;color:var(--ink-400);font-size:0.875rem">No slots available</p>'; return; }
    container.innerHTML = slots.map(slot => {
      const isBooked = (booked || []).includes(slot) || (avail[slot]?.available === 0);
      if (isBooked) return `<button class="slot-btn booked" disabled>🔴 ${slot}</button>`;
      return `<button class="slot-btn available ${rescheduleSlot===slot?'selected':''}" onclick="selectRescheduleSlot('${slot}',this)">${slot}</button>`;
    }).join('');
  } catch { container.innerHTML = '<p style="grid-column:1/-1;color:var(--ink-400);font-size:0.875rem">Failed to load slots</p>'; }
}

function selectRescheduleSlot(slot) {
  rescheduleSlot = slot;
  document.querySelectorAll('#reschedule-slots .slot-btn.available').forEach(btn => btn.classList.remove('selected'));
  event.target.classList.add('selected');
  document.getElementById('confirm-reschedule-btn').disabled = false;
}

async function confirmReschedule() {
  if (!rescheduleTarget || !rescheduleSlot) return;
  const date = document.getElementById('reschedule-date').value;
  try {
    await api.put(`/bookings/${rescheduleTarget.bookingId}/reschedule`, { date, timeSlot: rescheduleSlot });
    showToast('Booking rescheduled!');
    closeRescheduleModal();
    loadBookings();
  } catch (err) { showToast(err.message || 'Failed to reschedule', 'error'); }
}

function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const id = 'toast-' + Date.now();
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  c.insertAdjacentHTML('beforeend', `<div id="${id}" class="toast-item ${type}">${icons[type]||'ℹ️'} ${msg}</div>`);
  setTimeout(() => document.getElementById(id)?.remove(), 4000);
}

loadBookings();
</script>
</body>
</html>
