<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Match Detail — PitchUp</title>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="nav-container"></div>
<div id="toast-container"></div>

<!-- Loading -->
<div id="page-loading" style="display:flex;align-items:center;justify-content:center;min-height:80vh">
  <div class="spinner"></div>
</div>

<!-- Content -->
<div id="page-content" style="display:none;min-height:100vh;background:var(--ink-50);padding-bottom:80px">

  <!-- Hero -->
  <div id="match-hero" style="background:linear-gradient(135deg,var(--pitch-900),var(--pitch-800),var(--pitch-700));padding:96px 16px 48px;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;opacity:0.04;background-image:radial-gradient(circle,#fff 1px,transparent 1px);background-size:30px 30px"></div>
    <div style="max-width:900px;margin:0 auto;position:relative;z-index:1">
      <a href="/matches.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8125rem;font-weight:600;color:var(--pitch-300);text-decoration:none;margin-bottom:20px;transition:color 0.2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--pitch-300)'">
        ← Back to matches
      </a>
      <div id="hero-badges" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px"></div>
      <h1 id="match-title" style="font-size:clamp(1.5rem,5vw,2.25rem);font-weight:900;color:#fff;margin-bottom:16px"></h1>
      <div id="fill-bar-wrap" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;font-size:0.875rem;color:var(--pitch-300);margin-bottom:8px">
          <span id="fill-label"></span>
          <span id="fill-count"></span>
        </div>
        <div class="fill-bar" style="height:8px"><div id="fill-inner" class="fill-bar-inner" style="background:#fff"></div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
        <button id="cta-btn" onclick="handleCTA()" class="btn-primary" style="padding:12px 28px;font-size:0.9375rem"></button>
        <button onclick="shareMatch()" style="display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;background:#25D366;color:#fff;font-weight:700;border:none;cursor:pointer;font-size:0.875rem;transition:all 0.2s">
          💬 Share on WhatsApp
        </button>
      </div>
    </div>
  </div>

  <div style="max-width:900px;margin:0 auto;padding:32px 16px">
    <!-- Info tiles -->
    <div class="card" style="padding:24px;margin-bottom:24px">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px" id="info-tiles"></div>
    </div>

    <!-- Description -->
    <div id="desc-card" class="card" style="padding:24px;margin-bottom:24px;display:none">
      <h3 style="font-size:0.875rem;font-weight:700;color:var(--ink-700);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em">About this match</h3>
      <p id="match-desc" style="font-size:0.9375rem;color:var(--ink-600);line-height:1.7"></p>
    </div>

    <!-- Who's playing -->
    <div class="card" style="padding:24px">
      <h3 style="font-size:0.875rem;font-weight:700;color:var(--ink-700);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.05em">Who's playing</h3>
      <div id="players-list" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>
</div>

<!-- Cancel confirm dialog -->
<div id="cancel-modal" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:380px">
    <div style="padding:24px">
      <div style="width:56px;height:56px;border-radius:50%;background:#FEF2F2;border:2px solid #FECACA;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.5rem">⚠️</div>
      <h3 style="font-size:1rem;font-weight:700;color:var(--ink-900);text-align:center;margin-bottom:8px" id="cancel-title">Cancel Match?</h3>
      <p style="font-size:0.875rem;color:var(--ink-500);text-align:center;margin-bottom:20px" id="cancel-desc">This will cancel the match for all players.</p>
      <div style="display:flex;gap:12px">
        <button onclick="closeCancelModal()" class="btn-ghost" style="flex:1">Keep It</button>
        <button onclick="confirmCancel()" style="flex:1;padding:10px 20px;border-radius:12px;background:#EF4444;color:#fff;font-weight:700;border:none;cursor:pointer">Confirm</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script src="js/navbar.html.js"></script>
<script>
const matchId = new URLSearchParams(location.search).get('id');
if (!matchId) window.location.href = '/matches.html';

let match, cancelAction = null;

function minutesUntil(date, time) {
  return Math.round((new Date(`${date}T${time}`) - Date.now()) / 60000);
}

async function loadMatch() {
  try {
    match = await api.get(`/matches/${matchId}`);
    renderMatch();
    document.getElementById('page-loading').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';
  } catch {
    document.getElementById('page-loading').innerHTML = '<div style="text-align:center;padding:64px 16px"><p style="font-size:3rem;margin-bottom:16px">👥</p><h3 style="font-weight:700;margin-bottom:8px">Match not found</h3><a href="/matches.html" class="btn-primary">Back to Matches</a></div>';
  }
}

function renderMatch() {
  const user = getUser();
  const total = match.total_players_needed || match.totalPlayersNeeded || 0;
  const current = match.current_players || match.currentPlayers || 0;
  const pct = total ? Math.round((current / total) * 100) : 0;
  const isFull = match.status === 'full' || current >= total;
  const isOrganiser = user && (match.organiser_id === user.id || match.organiserId === user.id);
  const isJoined = match.is_joined || match.isJoined;
  const mins = minutesUntil(match.date, match.time);
  const isUrgent = mins > 0 && mins < 120;
  const matchType = match.match_type || match.matchType || 'Cricket';

  // Hero badges
  const badgesEl = document.getElementById('hero-badges');
  let badges = `<span class="badge ${matchType === 'Box Cricket' ? 'badge-green' : 'badge-blue'}">${matchType}</span>`;
  if (isUrgent) badges += `<span class="badge badge-red">🔥 ${mins < 60 ? mins + 'm' : Math.round(mins/60) + 'h'} left</span>`;
  if (isFull) badges += `<span class="badge badge-amber">Team Complete</span>`;
  if (match.status === 'cancelled') badges += `<span class="badge badge-red">Cancelled</span>`;
  badgesEl.innerHTML = badges;

  document.getElementById('match-title').textContent = match.title || 'Cricket Match';

  document.getElementById('fill-label').textContent = `${current} of ${total} players joined`;
  document.getElementById('fill-count').textContent = `${total - current} spots left`;
  document.getElementById('fill-inner').style.width = pct + '%';

  // CTA button
  const ctaBtn = document.getElementById('cta-btn');
  if (match.status === 'cancelled') {
    ctaBtn.textContent = 'Match Cancelled';
    ctaBtn.disabled = true;
    ctaBtn.style.opacity = '0.5';
  } else if (isOrganiser) {
    ctaBtn.textContent = 'Cancel Match';
    ctaBtn.style.background = '#EF4444';
    ctaBtn.onclick = () => openCancelModal('match');
  } else if (isJoined) {
    ctaBtn.textContent = '✓ You\'re confirmed — Leave';
    ctaBtn.style.background = '#EF4444';
    ctaBtn.onclick = () => openCancelModal('leave');
  } else if (isFull) {
    ctaBtn.textContent = 'Team Full';
    ctaBtn.disabled = true;
    ctaBtn.style.opacity = '0.5';
  } else {
    ctaBtn.textContent = 'Join this match';
    ctaBtn.onclick = joinMatch;
  }

  // Info tiles
  document.getElementById('info-tiles').innerHTML = `
    <div style="text-align:center;padding:16px;background:var(--ink-50);border-radius:12px">
      <div style="font-size:1.5rem;margin-bottom:6px">📍</div>
      <p style="font-size:0.7rem;color:var(--ink-400);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Where</p>
      <p style="font-size:0.875rem;font-weight:600;color:var(--ink-900)">${match.location||''}</p>
      <p style="font-size:0.75rem;color:var(--ink-500)">${match.city||''}</p>
    </div>
    <div style="text-align:center;padding:16px;background:var(--ink-50);border-radius:12px">
      <div style="font-size:1.5rem;margin-bottom:6px">📅</div>
      <p style="font-size:0.7rem;color:var(--ink-400);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Date</p>
      <p style="font-size:0.875rem;font-weight:600;color:var(--ink-900)">${match.date||''}</p>
    </div>
    <div style="text-align:center;padding:16px;background:var(--ink-50);border-radius:12px">
      <div style="font-size:1.5rem;margin-bottom:6px">🕐</div>
      <p style="font-size:0.7rem;color:var(--ink-400);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Time</p>
      <p style="font-size:0.875rem;font-weight:600;color:var(--ink-900)">${match.time||''}</p>
      ${isUrgent ? `<p style="font-size:0.7rem;color:#EF4444;font-weight:700">🔥 ${mins}m away</p>` : ''}
    </div>
    <div style="text-align:center;padding:16px;background:var(--ink-50);border-radius:12px">
      <div style="font-size:1.5rem;margin-bottom:6px">👥</div>
      <p style="font-size:0.7rem;color:var(--ink-400);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Players</p>
      <p style="font-size:0.875rem;font-weight:600;color:var(--ink-900)">${current}/${total}</p>
      <p style="font-size:0.75rem;color:var(--ink-500)">${total - current} spots left</p>
    </div>`;

  // Description
  if (match.description) {
    document.getElementById('desc-card').style.display = 'block';
    document.getElementById('match-desc').textContent = match.description;
  }

  // Players list
  const playersEl = document.getElementById('players-list');
  const players = match.players || [];
  const organiserId = match.organiser_id || match.organiserId;
  let html = '';
  players.forEach(p => {
    const isOrg = p.id === organiserId || p.user_id === organiserId;
    html += `
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:${isOrg?'var(--pitch-50)':'var(--ink-50)'}">
        <div class="avatar-circle lg" style="margin-left:0">${(p.name||'P')[0].toUpperCase()}</div>
        <div style="flex:1">
          <p style="font-size:0.9375rem;font-weight:600;color:var(--ink-900)">${p.name||'Player'}</p>
          ${isOrg ? '<p style="font-size:0.75rem;color:var(--pitch-700);font-weight:600">⭐ Organiser</p>' : ''}
        </div>
      </div>`;
  });
  // Open slots
  const openSlots = Math.max(0, total - players.length);
  for (let i = 0; i < Math.min(openSlots, 6); i++) {
    html += `<div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;border:2px dashed var(--ink-200)">
      <div class="avatar-circle lg empty" style="margin-left:0">?</div>
      <p style="font-size:0.875rem;color:var(--ink-400);font-style:italic">Open slot</p>
    </div>`;
  }
  if (openSlots > 6) html += `<p style="font-size:0.875rem;color:var(--ink-400);text-align:center;padding:8px">+${openSlots - 6} more open slots</p>`;
  playersEl.innerHTML = html;
}

async function joinMatch() {
  if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
  try {
    await api.post(`/matches/${matchId}/join`);
    showToast('Joined the match!');
    loadMatch();
  } catch (err) { showToast(err.message || 'Failed to join', 'error'); }
}

function openCancelModal(action) {
  cancelAction = action;
  const isMatch = action === 'match';
  document.getElementById('cancel-title').textContent = isMatch ? 'Cancel Match?' : 'Leave Match?';
  document.getElementById('cancel-desc').textContent = isMatch ? 'This will cancel the match for all players.' : 'You will be removed from this match.';
  document.getElementById('cancel-modal').style.display = 'flex';
}
function closeCancelModal() { document.getElementById('cancel-modal').style.display = 'none'; cancelAction = null; }

async function confirmCancel() {
  try {
    if (cancelAction === 'match') await api.delete(`/matches/${matchId}`);
    else await api.delete(`/matches/${matchId}/join`);
    showToast(cancelAction === 'match' ? 'Match cancelled' : 'Left the match');
    closeCancelModal();
    if (cancelAction === 'match') setTimeout(() => window.location.href = '/matches.html', 1200);
    else loadMatch();
  } catch (err) { showToast(err.message || 'Failed', 'error'); }
}

function shareMatch() {
  const text = `Join our cricket match!\n${match.title}\n📍 ${match.location}, ${match.city}\n📅 ${match.date} at ${match.time}\n${window.location.href}`;
  if (navigator.share) {
    navigator.share({ title: match.title, text, url: window.location.href }).catch(() => {});
  } else {
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  }
}

function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const id = 'toast-' + Date.now();
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  c.insertAdjacentHTML('beforeend', `<div id="${id}" class="toast-item ${type}">${icons[type]||'ℹ️'} ${msg}</div>`);
  setTimeout(() => document.getElementById(id)?.remove(), 4000);
}

loadMatch();
</script>
</body>
</html>
